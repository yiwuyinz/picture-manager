server:
  port: 8123
  servlet:
    context-path: /api
    session:
      cookie:
        max-age: 2592000
spring:
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    listener:
      simple:
        # 消费者并发数，限制同时处理的任务数量
        concurrency: 3
        max-concurrency: 5
        # 每次只取1条，处理完再取下一条，防止某个消费者积压
        prefetch: 1
        # 失败重试：本地重试3次后转入死信或丢弃
        retry:
          enabled: true
          max-attempts: 3
          initial-interval: 1000ms
  # 空间图片分表
  shardingsphere:
    datasource:
      names: picture
      picture:
        type: com.zaxxer.hikari.HikariDataSource
        driver-class-name: com.mysql.cj.jdbc.Driver
        url: jdbc:mysql://localhost:3306/picture
        username: root
        password: 123456
    rules:
      sharding:
        tables:
          picture:
            actual-data-nodes: picture.picture  # 动态分表
            table-strategy:
              standard:
                sharding-column: spaceId
                sharding-algorithm-name: picture_sharding_algorithm  # 使用自定义分片算法
        sharding-algorithms:
          picture_sharding_algorithm:
            type: CLASS_BASED
            props:
              strategy: standard
              algorithmClassName: com.example.picturebackend.manager.sharding.PictureShardingAlgorithm
    props:
      sql-show: true
  application:
    name: picture-backend
  session:
    store-type: redis
    timeout: 2592000
  redis:
    database: 0
    host: 127.0.0.1
    port: 6379
    timeout: 5000
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: false
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      logic-delete-field: isDelete #全局逻辑删除的实体字段名
      logic-delete-value: 1 #逻辑已删除值（默认为1）
      logic-not-delete-value: 0 #逻辑未删除值（默认为0）
    enable-sql-runner: true
# 接口文档配置
knife4j:
  enable: true
  openapi:
    title: "接口文档"
    version: 1.0
    group:
      default:
        api-rule: package
        api-rule-resources:
          - com.example.picturebackend.controller

cos:
  client:
    host: xxxxxxxxxx
    secretId: xxxxxxxxxx
    secretKey: xxxxxxxxxx
    region: xxxxxxxxxx
    bucket: xxxxxxxxxx

aliYunAi:
  apiKey: xxxxxxxxxx